{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2>Welcome Back</h2>
        <p>Login or create a new account.</p>
    </div>

    <!-- Toggle Logic (Simple JS for switching forms) -->
    <div style="display: flex; margin-bottom: 1rem; border-bottom: 1px solid #ddd;">
        <button onclick="showLogin()" id="loginTab"
            style="flex: 1; padding: 1rem; background: none; border: none; cursor: pointer; border-bottom: 2px solid var(--primary-color);">Login</button>
        <button onclick="showRegister()" id="regTab"
            style="flex: 1; padding: 1rem; background: none; border: none; cursor: pointer;">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" method="POST">
        <input type="hidden" name="action" value="login">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" method="POST" style="display: none;">
        <input type="hidden" name="action" value="register">
        <input type="text" name="username" placeholder="Choose a Username" required>
        <input type="password" name="password" placeholder="Choose a Password" required>
        <label for="role" style="display: block; margin-bottom: 0.5rem;">I am a:</label>
        <select name="role" required>
            <option value="farmer">Farmer</option>
            <option value="bidder">Bidder</option>
        </select>
        <button type="submit" class="btn btn-secondary" style="width: 100%;">Register</button>
    </form>
</div>

<script>
    function showLogin() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginTab').style.borderBottom = '2px solid var(--primary-color)';
        document.getElementById('regTab').style.borderBottom = 'none';
    }
    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('loginTab').style.borderBottom = 'none';
        document.getElementById('regTab').style.borderBottom = '2px solid var(--secondary-color)';
    }
</script>
{% endblock %}
