<!DOCTYPE html>
<html>
<head>
    <title>Agri Advisory System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🌾 Smart Agri Advisory</h1>

    <form method="POST">
        <input type="text" name="name" placeholder="Farmer Name" required>
        <input type="text" name="phone" placeholder="Phone (+91XXXXXXXX)" required>
        <input type="text" name="city" placeholder="City" required>
        <input type="text" name="crop" placeholder="Crop" required>

        <button type="submit">Register & Send SMS</button>
    </form>

    {% if success %}
        <p class="success">{{ success }}</p>
    {% endif %}
</div>

</body>
</html>
